<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; background: transparent; }
  
  .assistant-card {
    background: #FFFFFF;
    border-radius: 28px;
    width: 500px;
    height: 700px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    border: 2px solid #f0f0f0;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* SweetRush Rainbow Top Border */
  .assistant-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(90deg, #4A1D7A, #BA5C2D, #517B27, #007C7C);
    z-index: 10;
  }

  .header { 
    display: flex; align-items: center; justify-content: center; padding: 25px 20px 15px;
    background: white; border-bottom: 1px solid #f0f0f0;
  }
  .header h2 { font-size: 18px; color: #753599; margin: 0; font-weight: 700; }

  #chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: #fff;
  }

  /* Chat Bubbles */
  .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; max-width: 85%; position: relative; }
  .bot-msg { background: #f1f3f4; color: #121B21; align-self: flex-start; border-bottom-left-radius: 4px; }
  .user-msg { background: #4A1D7A; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
  
  /* Labels for Data Categories */
  .category-tag { 
    font-size: 10px; text-transform: uppercase; font-weight: 800; 
    color: #753599; margin-bottom: 4px; display: block; letter-spacing: 0.5px; 
  }

  .resource-link { 
    display: block; margin-top: 10px; color: #4A1D7A; font-weight: bold; 
    text-decoration: none; border: 1px solid #4A1D7A; padding: 8px; 
    border-radius: 8px; text-align: center; transition: all 0.2s ease;
  }
  .resource-link:hover { background: #4A1D7A; color: white; }

  /* Bottom Bar */
  .input-container {
    padding: 15px;
    background: white;
    border-top: 1px solid #eee;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  input {
    flex: 1;
    padding: 12px 15px;
    border-radius: 25px;
    border: 1.5px solid #E0E0E0;
    font-size: 14px;
    outline: none;
  }

  /* Logo Search Button */
  .search-btn {
    background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; outline: none;
  }
  .search-btn img { 
    width: 32px; height: 32px; 
    transition: transform 0.2s ease, opacity 0.2s ease; 
  }
  .search-btn:hover img { 
    transform: scale(1.2); 
    opacity: 0.8; 
  }
</style>
</head>
<body>

<div class="assistant-card">
  <div class="header">
    <h2>Win Engine Assistant</h2>
  </div>

  <div id="chat-history">
    <div class="bubble bot-msg">Welcome to the Win Engine. I can help you find Case Studies, Design Resources, or Client Communication tips. What are we winning today?</div>
  </div>

  <div class="input-container">
    <input type="text" id="userInput" placeholder="Ask a question...">
    <button id="searchBtn" class="search-btn">
      <img src="https://assets.storydoc.com/15aa8fefe03b131b2d6334b9551d49a7/b018fd41-cf39-4174-b468-c7b4ad3153d2" alt="Search">
    </button>
  </div>
</div>

<script>
  let strategicLibrary = [];

  // CONFIGURATION: These links point to the "main" branch for auto-updates
  const DATA_SOURCES = [
    'https://raw.githubusercontent.com/jeanniehitchcock/win-engine-assets/main/cases.json',
    'https://raw.githubusercontent.com/jeanniehitchcock/win-engine-assets/main/design.json',
    'https://raw.githubusercontent.com/jeanniehitchcock/win-engine-assets/main/comm.json'
  ];

  // Fetch multiple JSON files simultaneously
  async function loadAllData() {
    try {
      const allFetches = DATA_SOURCES.map(url => 
        fetch(url + '?nocache=' + new Date().getTime()) // Prevents browser caching old versions
        .then(res => res.json())
      );
      const results = await Promise.all(allFetches);
      strategicLibrary = results.flat(); 
      console.log("Win Engine Ready: " + strategicLibrary.length + " resources loaded.");
    } catch (error) {
      console.error("Critical: Could not load data. Check GitHub file names and JSON formatting.", error);
    }
  }

  loadAllData();

  function processQuery() {
    const input = document.getElementById('userInput');
    const history = document.getElementById('chat-history');
    const query = input.value.toLowerCase().trim();
    
    if(!query) return;

    // Show User Input
    history.innerHTML += `<div class="bubble user-msg">${input.value}</div>`;
    input.value = '';
    history.scrollTop = history.scrollHeight;

    // Artificial delay for "bot thinking" feel
    setTimeout(() => {
      // Search logic: Find entries where the query matches a tag
      const matches = strategicLibrary.filter(item => 
        item.tags.some(tag => query.includes(tag.toLowerCase()))
      );
      
      let botResponse = "";
      if(matches.length > 0) {
        // We show the first/best match
        const best = matches[0];
        botResponse = `
          <div class="bubble bot-msg">
            <span class="category-tag">${best.category}</span>
            I found this for you: <strong>${best.title}</strong>.<br><br>
            ${best.advice}
            <a href="${best.link}" target="_blank" class="resource-link">${best.linkText} ➔</a>
          </div>`;
      } else {
        botResponse = `<div class="bubble bot-msg">I couldn't find a specific resource for that. Try searching for topics like 'Hilton', 'Accessibility', 'Retail', or 'Storyboard'.</div>`;
      }

      history.innerHTML += botResponse;
      history.scrollTop = history.scrollHeight;
    }, 600);
  }

  // Event Listeners for Interaction
  document.getElementById('searchBtn').addEventListener('click', processQuery);
  document.getElementById('userInput').addEventListener('keypress', (e) => { 
    if(e.key === 'Enter') processQuery(); 
  });
</script>

</body>
</html>
